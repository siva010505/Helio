channels:
  - name: "psychology_shorts"
    niche: "Psychology & human behavior (narrative format)"
    videos_per_day: 1
    upload_times: ["08:30", "20:00"]
    target_length_seconds: 75
    tone: "mysterious, narrative, intriguing, hook in first 2 seconds"
    voice: "piper:en_US-ryan-high"
    hashtags_base: ["#Psychology", "#HumanBehavior", "#Shorts"]
    commentary_style: "brief original opinion/reaction, not just a summary"
    brand:
      intro_sting_path: "assets/music/intro_sting.mp3"
      font: "assets/fonts/Roboto-Bold.ttf"
      accent_color: "#FFD400"
      logo_path: "assets/logo/channel_logo.png"
      watermark_opacity: 0.65

llm:
  provider: "nim"
  model: "meta/llama-3.1-70b-instruct"
  vision_model: "meta/llama-3.2-11b-vision-instruct"
  temperature: 0.8

video:
  resolution: "1080x1920"
  max_duration_seconds: 60
  min_duration_seconds: 50
  caption_style: "bold_bottom_center"
  caption_animation: "word_by_word_reveal"
  scene_target_seconds: 2.5

visual_sources:
  apis: ["pexels", "pixabay", "unsplash"]
  vision_scoring:
    enabled: true
    max_candidates_scored_per_scene: 2
    fallback_if_no_good_match: "kinetic_text_card"

editing:
  ken_burns:
    vary_per_scene: true
    effects: ["zoom_in", "zoom_out", "pan_left", "pan_right"]
    zoom_range: [0.08, 0.15]
  punch:
    enabled: true
    trigger_words: ["never", "shocking", "secret", "banned", "always", "nobody", "everyone", "million", "billion", "percent"]
    max_punch_moments: 6
    primary_punch_count: 3
    primary_cutaway_duration_seconds: 0.5
    secondary_zoom_flash_scale: 1.18
    secondary_zoom_flash_duration_seconds: 0.25

quota:
  youtube_daily_unit_budget: 8000
  upload_cost_units: 1600

learning:
  min_videos_before_adjusting: 5
  metrics_pulled: ["views", "likes", "comments", "average_view_duration", "average_view_percentage"]
